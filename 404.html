<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Facet — You've been sent photos</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0C0D12; color: #E2E8F4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center; padding: 24px;
    }
    .logo { width: 72px; height: 72px; margin-bottom: 24px; }
    h1 { font-size: 22px; font-weight: 600; margin: 0 0 8px; }
    p { font-size: 15px; line-height: 1.5; color: #9AA4B8; margin: 0 0 28px; max-width: 320px; }
    .btn {
      display: inline-block; background: #4AF2FF; color: #0C0D12;
      font-weight: 600; font-size: 16px; text-decoration: none;
      padding: 14px 28px; border-radius: 12px;
    }
    .hint { margin-top: 20px; font-size: 13px; color: #5A6478; }
  </style>
</head>
<body>
  <svg class="logo" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
    <rect x="39" y="23" width="2" height="12" rx="1" fill="#4AF2FF" opacity="0.85"/>
    <rect x="45" y="39" width="12" height="2" rx="1" fill="#4AF2FF" opacity="0.85"/>
    <rect x="39" y="45" width="2" height="12" rx="1" fill="#4AF2FF" opacity="0.85"/>
    <rect x="23" y="39" width="12" height="2" rx="1" fill="#4AF2FF" opacity="0.85"/>
    <circle cx="40" cy="40" r="5" fill="#4AF2FF"/>
    <circle cx="40" cy="18" r="4" fill="#4AF2FF"/>
    <circle cx="62" cy="40" r="4" fill="#4AF2FF"/>
    <circle cx="40" cy="62" r="4" fill="#4AF2FF"/>
    <circle cx="18" cy="40" r="4" fill="#4AF2FF"/>
  </svg>
  <h1>Someone shared photos with you</h1>
  <p>Facet automatically shares the photos your friends take of you. Open the app to see them.</p>
  <a class="btn" id="open" href="#">Open in Facet</a>
  <div class="hint" id="hint">Don't have the app yet?<br><a id="store" href="https://play.google.com/store/apps/details?id=com.facet.app" style="color:#4AF2FF;">Get Facet</a></div>

  <script>
    (function () {
      var m = location.pathname.match(/\/invite\/([a-f0-9-]+)/i);
      var token = m ? m[1] : null;
      var ua = navigator.userAgent || "";
      var isIOS = /iphone|ipad|ipod/i.test(ua);
      if (isIOS) {
        document.getElementById("store").href = "https://apps.apple.com/app/facet";
      }
      if (token) {
        try { localStorage.setItem("facet_invite_token", token); } catch (e) {}
        var scheme = "facet://invite/" + token;
        document.getElementById("open").setAttribute("href", scheme);
        setTimeout(function () { window.location.href = scheme; }, 300);
      } else {
        document.getElementById("open").style.display = "none";
      }
    })();
  </script>
</body>
</html>
